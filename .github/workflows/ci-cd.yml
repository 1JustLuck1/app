name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────
  # 1. Тесты (CI)
  # ─────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python + uv  
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true
        
      - name: Install dependencies
        run: uv sync --dev
        
      - name: Run tests
        run: uv run python -m pytest -v --tb=short
        env:
          # 🔹 Тестовые значения для pydantic settings
          postgres_user: test_user
          postgres_password: test_password
          postgres_db: test_db
          postgres_host: localhost
          secret_key: test_secret_key_for_ci_only
          
          # 🔹 Опционально: использовать SQLite для тестов
          database_url: sqlite:///./test.db

  # ─────────────────────────────────────
  # 2. Сборка Docker-образа (CD)
  # ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test  # Запускается только если тесты прошли
    if: github.event_name == 'push'  # Только при пуше, не при PR
    
    permissions:
      contents: read
      packages: write  # Для публикации в GHCR
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max