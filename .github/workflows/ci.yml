name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python + uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install package editable
        run: uv pip install -e .

      - name: Run tests
        run: uv run python -m pytest -v --tb=short
        env:
          # 🔹 Тестовые значения для pydantic settings
          postgres_user: test_user
          postgres_password: test_password
          postgres_db: test_db
          postgres_host: localhost
          secret_key: test_secret_key_for_ci_only
          
          # 🔹 Опционально: использовать SQLite для тестов
          database_url: sqlite:///./test.db