name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python + uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true

      - name: 📦 Install dependencies with --system flag
        # 🔥 --system: устанавливаем в системный Python (без venv)
        # 🔥 --group dev: устанавливаем зависимости из группы dev
        run: uv pip install --system -e ".[dev]"
        # ИЛИ с новым синтаксисом групп:
        # run: uv pip install --system -e . --group dev

      - name: 🧪 Run tests
        run: uv run pytest app/tests/ -v