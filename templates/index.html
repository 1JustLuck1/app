<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер Задач</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; color: #333; }
        
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input[type="text"], textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        button.delete { background-color: #dc3545; padding: 5px 10px; font-size: 12px; }
        button.edit { background-color: #007bff; padding: 5px 10px; font-size: 12px; }
        
        .task-list { list-style: none; padding: 0; }
        .task-item { background: white; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .task-item:last-child { border-bottom: none; }
        .task-info { flex-grow: 1; }
        .task-title { font-weight: bold; font-size: 1.1em; }
        .task-desc { color: #666; font-size: 0.9em; }
        .completed { text-decoration: line-through; color: #888; }
        .actions { margin-left: 15px; }
    </style>
</head>
<body>

    <h1>Список задач</h1>

    <!-- Форма создания -->
    <div class="form-container">
        <h3>Добавить новую задачу</h3>
        <form action="/add" method="post">
            <input type="text" name="title" placeholder="Название задачи" required>
            <textarea name="description" placeholder="Описание"></textarea>
            <button type="submit">Добавить</button>
        </form>
    </div>

    <!-- Список задач -->
    <ul class="task-list">
        {% for task in tasks %}
        <li class="task-item">
            <div class="task-info">
                <div class="task-title {% if task.is_completed %}completed{% endif %}">{{ task.title }}</div>
                <div class="task-desc {% if task.is_completed %}completed{% endif %}">{{ task.description }}</div>
            </div>
            <div class="actions">
                <!-- Кнопка переключения статуса -->
                <form action="/toggle/{{ task.id }}" method="post" style="display:inline;">
                    <button type="submit" style="background-color: {% if task.is_completed %}#ffc107{% else %}#6c757d{% endif %};">
                        {% if task.is_completed %}Вернуть{% else %}Готово{% endif %}
                    </button>
                </form>
                
                <!-- Кнопка удаления -->
                <form action="/delete/{{ task.id }}" method="post" style="display:inline;">
                    <button type="submit" class="delete">Удалить</button>
                </form>
            </div>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
